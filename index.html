function genId() {
  return Math.random().toString(36).slice(2, 10);
}

function fmt(ts) {
  if (!ts) return "—";
  const d = new Date(ts);
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric" }) +
    " " + d.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" });
}

function FmtCell({ ts }) {
  if (!ts) return <span style={{ color: "var(--color-text-tertiary)" }}>—</span>;
  const d = new Date(ts);
  const date = d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
  const time = d.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" });
  return <div><div>{date}</div><div style={{ color: "var(--color-text-tertiary)", fontSize: 11 }}>{time}</div></div>;
}

const TABS = ["Log Out", "Log In", "History", "Inventory", "Daily Count", "Setup"];

function App() {
  const [data, setData] = useState(null);
  const [tab, setTab] = useState("Log Out");
  const [currentLocationId, setCurrentLocationId] = useState("");
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const loaded = JSON.parse(raw);
        if (!loaded.inventory) loaded.inventory = [];
        if (!loaded.countRows) loaded.countRows = [];
        setData(loaded);
      } else {
        setData(DEFAULT_DATA);
      }
    } catch {
      setData(DEFAULT_DATA);
    }
  }, []);

  const save = useCallback((newData) => {
    setData(newData);
    setSaving(true);
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(newData));
    } catch {}
    setTimeout(() => setSaving(false), 800);
  }, []);

  if (!data) {
    return (
      <div style={{ padding: "2rem", color: "var(--color-text-secondary)", fontFamily: "var(--font-mono)", fontSize: 13 }}>
        Loading…
      </div>
    );
  }

  const currentLocation = data.locations.find(l => l.id === currentLocationId);
  const pendingTransfers = data.transfers.filter(t => t.status === "in_transit");

  return (
    <div style={{ fontFamily: "var(--font-sans)", maxWidth: 680, margin: "0 auto" }}>
      <h2 className="sr-only">Inventory transfer tracker</h2>

      {/* Header */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "1rem 0 0.75rem", borderBottom: "0.5px solid var(--color-border-tertiary)" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <i className="ti ti-transfer" style={{ fontSize: 20 }} aria-hidden="true"></i>
          <span style={{ fontWeight: 500, fontSize: 16 }}>Inventory Tracker</span>
          {saving && <span style={{ fontSize: 12, color: "var(--color-text-tertiary)" }}>Saving…</span>}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <i className="ti ti-map-pin" style={{ fontSize: 15, color: "var(--color-text-secondary)" }} aria-hidden="true"></i>
          <select
            value={currentLocationId}
            onChange={e => setCurrentLocationId(e.target.value)}
            style={{ fontSize: 13, padding: "4px 8px", minWidth: 140 }}
          >
            <option value="">— Select this location —</option>
            {data.locations.map(l => (
              <option key={l.id} value={l.id}>{l.name}</option>
            ))}
          </select>
        </div>
      </div>

      {/* Pending badge */}
      {pendingTransfers.length > 0 && (
        <div style={{ background: "var(--color-background-warning)", border: "0.5px solid var(--color-border-warning)", borderRadius: "var(--border-radius-md)", padding: "8px 12px", margin: "0.75rem 0 0", display: "flex", alignItems: "center", gap: 8 }}>
          <i className="ti ti-truck" style={{ fontSize: 15, color: "var(--color-text-warning)" }} aria-hidden="true"></i>
          <span style={{ fontSize: 13, color: "var(--color-text-warning)" }}>
            {pendingTransfers.length} transfer{pendingTransfers.length !== 1 ? "s" : ""} in transit
          </span>
        </div>
      )}

      {/* Tabs */}
      <div style={{ display: "flex", gap: 0, borderBottom: "0.5px solid var(--color-border-tertiary)", marginTop: "0.75rem" }}>
        {TABS.map(t => (
          <button
            key={t}
            onClick={() => setTab(t)}
            style={{
              background: "transparent",
              border: "none",
              borderBottom: tab === t ? "2px solid var(--color-text-primary)" : "2px solid transparent",
              padding: "8px 16px",
              fontSize: 13,
              fontWeight: tab === t ? 500 : 400,
              color: tab === t ? "var(--color-text-primary)" : "var(--color-text-secondary)",
              cursor: "pointer",
              marginBottom: -1,
            }}
          >
            {t}
          </button>
        ))}
      </div>

      <div style={{ paddingTop: "1.25rem" }}>
        {tab === "Log Out" && (
          <LogOut
            data={data}
            save={save}
            currentLocationId={currentLocationId}
          />
        )}
        {tab === "Log In" && (
          <LogIn
            data={data}
            save={save}
            currentLocationId={currentLocationId}
          />
        )}
        {tab === "History" && <History data={data} save={save} />}
        {tab === "Inventory" && <Inventory data={data} save={save} />}
        {tab === "Daily Count" && <DailyCount data={data} save={save} />}
        {tab === "Setup" && <Setup data={data} save={save} />}
      </div>
    </div>
  );
}

function LogOut({ data, save, currentLocationId }) {
  const [itemId, setItemId] = useState("");
  const [destId, setDestId] = useState("");
  const [qty, setQty] = useState(1);
  const [reason, setReason] = useState("");
  const [note, setNote] = useState("");
  const [initials, setInitials] = useState("");
  const [transferDate, setTransferDate] = useState(new Date().toISOString().slice(0, 10));
  const [done, setDone] = useState(false);

  if (!currentLocationId) {
    return <Notice icon="ti-map-pin" text="Select your current location at the top to log items out." />;
  }

  const otherLocations = data.locations.filter(l => l.id !== currentLocationId);

  function submit() {
    if (!itemId || !destId) return;
    const transfer = {
      id: genId(),
      itemId,
      qty: Number(qty),
      reason,
      checkedOutBy: initials.trim().toUpperCase(),
      fromLocationId: currentLocationId,
      toLocationId: destId,
      status: "in_transit",
      removedAt: new Date(transferDate + "T12:00:00").getTime(),
      arrivedAt: null,
      note: note.trim(),
    };

    // Deduct from source location inventory
    let updatedInventory = data.inventory.map(e =>
      e.locationId === currentLocationId && e.itemId === itemId
        ? { ...e, qty: Math.max(0, e.qty - Number(qty)) }
        : e
    );

    save({ ...data, transfers: [transfer, ...data.transfers], inventory: updatedInventory });
    setItemId("");
    setDestId("");
    setQty(1);
    setReason("");
    setNote("");
    setInitials("");
    setTransferDate(new Date().toISOString().slice(0, 10));
    setDone(true);
    setTimeout(() => setDone(false), 2500);
  }

  const item = data.items.find(i => i.id === itemId);
  const dest = data.locations.find(l => l.id === destId);
  const fromLoc = data.locations.find(l => l.id === currentLocationId);

  const inventoryEntry = itemId
    ? data.inventory.find(e => e.locationId === currentLocationId && e.itemId === itemId)
    : null;
  const currentStock = inventoryEntry ? inventoryEntry.qty : null;
  const stockWarning = itemId && currentStock !== null && qty > currentStock
    ? qty > 0 && currentStock === 0
      ? "There is no recorded inventory for this item at this location."
      : `You're removing ${qty} but only ${currentStock} ${currentStock === 1 ? "unit is" : "units are"} recorded here.`
    : null;
  const stockNotice = itemId && currentStock !== null && !stockWarning
    ? `${currentStock} unit${currentStock !== 1 ? "s" : ""} currently recorded at this location.`
    : null;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      {done && (
        <div style={{ background: "var(--color-background-success)", border: "0.5px solid var(--color-border-success)", borderRadius: "var(--border-radius-md)", padding: "10px 14px", display: "flex", alignItems: "center", gap: 8 }}>
          <i className="ti ti-check" style={{ color: "var(--color-text-success)" }} aria-hidden="true"></i>
          <span style={{ fontSize: 13, color: "var(--color-text-success)" }}>Item logged out — marked as in transit.</span>
        </div>
      )}

      {stockWarning && (
        <div style={{ background: "var(--color-background-warning)", border: "0.5px solid var(--color-border-warning)", borderRadius: "var(--border-radius-md)", padding: "10px 14px", display: "flex", alignItems: "center", gap: 8 }}>
          <i className="ti ti-alert-triangle" style={{ color: "var(--color-text-warning)", fontSize: 15, flexShrink: 0 }} aria-hidden="true"></i>
          <span style={{ fontSize: 13, color: "var(--color-text-warning)" }}>{stockWarning}</span>
        </div>
      )}

      {stockNotice && !stockWarning && (
        <div style={{ fontSize: 12, color: "var(--color-text-tertiary)", marginTop: -8 }}>
          <i className="ti ti-package" style={{ fontSize: 12, marginRight: 4 }} aria-hidden="true"></i>
          {stockNotice}
        </div>
      )}

      <Field label="Item being removed">
        <ItemSelect
          items={data.items.filter(i =>
            data.inventory.some(e => e.locationId === currentLocationId && e.itemId === i.id && e.qty > 0)
          )}
          value={itemId}
          onChange={setItemId}
          emptyMessage="No inventory recorded at this location."
        />
      </Field>

      <Field label="Destination">
        <select value={destId} onChange={e => setDestId(e.target.value)} style={{ width: "100%" }}>
          <option value="">Select destination…</option>
          {otherLocations.map(l => (
            <option key={l.id} value={l.id}>{l.name}</option>
          ))}
        </select>
      </Field>

      <Field label="Reason">
        <select value={reason} onChange={e => setReason(e.target.value)} style={{ width: "100%" }}>
          <option value="">— Select a reason —</option>
          <option value="Re-organizing">Re-organizing</option>
          <option value="To Testing">To Testing</option>
          <option value="Done Testing">Done Testing</option>
          <option value="Roof Testing">Roof Testing</option>
          <option value="Write Off">Write Off</option>
          <option value="To Shipping">To Shipping</option>
          <option value="To QCH">To QCH</option>
        </select>
      </Field>

      <Field label="Quantity">
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <button onClick={() => setQty(q => Math.max(1, Number(q) - 1))} style={{ padding: "6px 12px", fontSize: 16, lineHeight: 1 }} aria-label="Decrease quantity">−</button>
          <input
            type="number"
            min="1"
            value={qty}
            onChange={e => setQty(Math.max(1, parseInt(e.target.value) || 1))}
            style={{ width: 70, textAlign: "center" }}
          />
          <button onClick={() => setQty(q => Number(q) + 1)} style={{ padding: "6px 12px", fontSize: 16, lineHeight: 1 }} aria-label="Increase quantity">+</button>
        </div>
      </Field>

      <Field label="Note (optional)">
        <input
          type="text"
          placeholder="Reason, job number, etc."
          value={note}
          onChange={e => setNote(e.target.value)}
          style={{ width: "100%" }}
        />
      </Field>

      <Field label="Checked out by (initials)">
        <input
          type="text"
          placeholder="e.g. JD"
          value={initials}
          onChange={e => setInitials(e.target.value.slice(0, 4))}
          style={{ width: 80, textTransform: "uppercase" }}
          maxLength={4}
        />
      </Field>

      <Field label="Transfer date">
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <input
            type="date"
            value={transferDate}
            onChange={e => setTransferDate(e.target.value)}
            style={{ width: 160 }}
          />
          {transferDate !== new Date().toISOString().slice(0, 10) && (
            <span style={{ fontSize: 12, color: "var(--color-text-warning)", fontWeight: 500 }}>Backdated</span>
          )}
        </div>
      </Field>

      {itemId && destId && (
        <div style={{ background: "var(--color-background-secondary)", borderRadius: "var(--border-radius-md)", padding: "10px 14px", fontSize: 13, color: "var(--color-text-secondary)" }}>
          <i className="ti ti-arrow-right" aria-hidden="true"></i>{" "}
          <strong style={{ color: "var(--color-text-primary)" }}>×{qty} {item?.name}</strong> leaving{" "}
          <strong style={{ color: "var(--color-text-primary)" }}>{fromLoc?.name}</strong> → headed to{" "}
          <strong style={{ color: "var(--color-text-primary)" }}>{dest?.name}</strong>
          {reason && <span style={{ marginLeft: 6, color: "var(--color-text-tertiary)" }}>· {reason}</span>}
        </div>
      )}

      <button
        onClick={submit}
        disabled={!itemId || !destId}
        style={{ alignSelf: "flex-start", padding: "8px 20px", cursor: (!itemId || !destId) ? "not-allowed" : "pointer", opacity: (!itemId || !destId) ? 0.4 : 1 }}
      >
        <i className="ti ti-logout" aria-hidden="true"></i>{" "}Log Out Item
      </button>
    </div>
  );
}

function LogIn({ data, save, currentLocationId }) {
  const [transferId, setTransferId] = useState("");
  const [done, setDone] = useState(false);
  const [initials, setInitials] = useState("");
  const [arrivalDate, setArrivalDate] = useState(new Date().toISOString().slice(0, 10));

  if (!currentLocationId) {
    return <Notice icon="ti-map-pin" text="Select your current location at the top to log items in." />;
  }

  const incoming = data.transfers.filter(
    t => t.status === "in_transit" && t.toLocationId === currentLocationId
  );

  function confirm() {
    if (!transferId) return;
    const transfer = data.transfers.find(t => t.id === transferId);
    const transferQty = transfer?.qty || 1;
    const itemId = transfer?.itemId;

    // Add to destination inventory
    const existingEntry = data.inventory.find(e => e.locationId === currentLocationId && e.itemId === itemId);
    let updatedInventory;
    if (existingEntry) {
      updatedInventory = data.inventory.map(e =>
        e.id === existingEntry.id ? { ...e, qty: e.qty + transferQty } : e
      );
    } else {
      updatedInventory = [...data.inventory, {
        id: genId(),
        locationId: currentLocationId,
        itemId,
        qty: transferQty,
        receivedFrom: "Transfer",
        note: "",
        addedAt: Date.now(),
      }];
    }

    const updatedTransfers = data.transfers.map(t =>
      t.id === transferId ? { ...t, status: "completed", arrivedAt: new Date(arrivalDate + "T12:00:00").getTime(), checkedInBy: initials.trim().toUpperCase() } : t
    );
    save({ ...data, transfers: updatedTransfers, inventory: updatedInventory });
    setTransferId("");
    setInitials("");
    setArrivalDate(new Date().toISOString().slice(0, 10));
    setDone(true);
    setTimeout(() => setDone(false), 2500);
  }

  const selected = incoming.find(t => t.id === transferId);
  const selItem = selected ? data.items.find(i => i.id === selected.itemId) : null;
  const selFrom = selected ? data.locations.find(l => l.id === selected.fromLocationId) : null;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      {done && (
        <div style={{ background: "var(--color-background-success)", border: "0.5px solid var(--color-border-success)", borderRadius: "var(--border-radius-md)", padding: "10px 14px", display: "flex", alignItems: "center", gap: 8 }}>
          <i className="ti ti-check" style={{ color: "var(--color-text-success)" }} aria-hidden="true"></i>
          <span style={{ fontSize: 13, color: "var(--color-text-success)" }}>Item checked in — transfer complete.</span>
        </div>
      )}

      {incoming.length === 0 ? (
        <Notice icon="ti-inbox" text="No items currently in transit to this location." />
      ) : (
        <>
          <Field label={`Items incoming to this location (${incoming.length})`}>
            <select value={transferId} onChange={e => setTransferId(e.target.value)} style={{ width: "100%" }}>
              <option value="">Select arriving item…</option>
              {incoming.map(t => {
                const it = data.items.find(i => i.id === t.itemId);
                const fr = data.locations.find(l => l.id === t.fromLocationId);
                return (
                  <option key={t.id} value={t.id}>
                    {t.qty > 1 ? `×${t.qty} ` : ""}{it?.name} (from {fr?.name}, {fmt(t.removedAt)})
                  </option>
                );
              })}
            </select>
          </Field>

          {selected && (
            <div style={{ background: "var(--color-background-secondary)", borderRadius: "var(--border-radius-md)", padding: "10px 14px", fontSize: 13, color: "var(--color-text-secondary)" }}>
              <i className="ti ti-arrow-right" aria-hidden="true"></i>{" "}
              <strong style={{ color: "var(--color-text-primary)" }}>{selItem?.name}</strong> from{" "}
              <strong style={{ color: "var(--color-text-primary)" }}>{selFrom?.name}</strong>
              {selected.note && <span> — "{selected.note}"</span>}
              <span style={{ marginLeft: 8, color: "var(--color-text-tertiary)" }}>{fmt(selected.removedAt)}</span>
            </div>
          )}

          <Field label="Checked in by (initials)">
            <input
              type="text"
              placeholder="e.g. JD"
              value={initials}
              onChange={e => setInitials(e.target.value.slice(0, 4))}
              style={{ width: 80, textTransform: "uppercase" }}
              maxLength={4}
            />
          </Field>

          <Field label="Arrival date">
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <input
                type="date"
                value={arrivalDate}
                onChange={e => setArrivalDate(e.target.value)}
                style={{ width: 160 }}
              />
              {arrivalDate !== new Date().toISOString().slice(0, 10) && (
                <span style={{ fontSize: 12, color: "var(--color-text-warning)", fontWeight: 500 }}>Backdated</span>
              )}
            </div>
          </Field>

          <button
            onClick={confirm}
            disabled={!transferId}
            style={{ alignSelf: "flex-start", padding: "8px 20px", cursor: !transferId ? "not-allowed" : "pointer", opacity: !transferId ? 0.4 : 1 }}
          >
            <i className="ti ti-login" aria-hidden="true"></i>{" "}Confirm Arrival
          </button>
        </>
      )}
    </div>
  );
}

function History({ data, save }) {
  const [filter, setFilter] = useState("all");
  const [itemFilter, setItemFilter] = useState("");
  const [locFilter, setLocFilter] = useState("");

  let transfers = [...data.transfers];
  if (filter === "in_transit") transfers = transfers.filter(t => t.status === "in_transit");
  if (filter === "completed") transfers = transfers.filter(t => t.status === "completed");
  if (itemFilter) transfers = transfers.filter(t => t.itemId === itemFilter);
  if (locFilter) transfers = transfers.filter(t => t.fromLocationId === locFilter || t.toLocationId === locFilter);

  function deleteTransfer(id) {
    save({ ...data, transfers: data.transfers.filter(t => t.id !== id) });
  }

  const thStyle = {
    padding: "8px 10px",
    fontSize: 11,
    fontWeight: 500,
    color: "var(--color-text-secondary)",
    textAlign: "left",
    borderBottom: "0.5px solid var(--color-border-tertiary)",
    whiteSpace: "nowrap",
    textTransform: "uppercase",
    letterSpacing: "0.04em",
  };

  const tdStyle = {
    padding: "9px 10px",
    fontSize: 13,
    borderBottom: "0.5px solid var(--color-border-tertiary)",
    verticalAlign: "middle",
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      {/* Filters */}
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
        {["all", "in_transit", "completed"].map(s => (
          <button
            key={s}
            onClick={() => setFilter(s)}
            style={{
              padding: "4px 12px",
              fontSize: 12,
              background: filter === s ? "var(--color-background-secondary)" : "transparent",
              borderColor: filter === s ? "var(--color-border-primary)" : "var(--color-border-tertiary)",
            }}
          >
            {s === "all" ? "All" : s === "in_transit" ? "In transit" : "Completed"}
          </button>
        ))}
        <select value={itemFilter} onChange={e => setItemFilter(e.target.value)} style={{ fontSize: 12, padding: "4px 8px" }}>
          <option value="">All items</option>
          {data.items.map(i => <option key={i.id} value={i.id}>{i.sku ? `${i.sku} — ` : ""}{i.name}</option>)}
        </select>
        <select value={locFilter} onChange={e => setLocFilter(e.target.value)} style={{ fontSize: 12, padding: "4px 8px" }}>
          <option value="">All locations</option>
          {data.locations.map(l => <option key={l.id} value={l.id}>{l.name}</option>)}
        </select>
        <span style={{ marginLeft: "auto", fontSize: 12, color: "var(--color-text-tertiary)" }}>{transfers.length} record{transfers.length !== 1 ? "s" : ""}</span>
      </div>

      {transfers.length === 0 ? (
        <Notice icon="ti-history" text="No transfers match the current filters." />
      ) : (
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", tableLayout: "fixed" }}>
            <colgroup>
              <col style={{ width: 44 }} />
              <col style={{ width: "24%" }} />
              <col style={{ width: "12%" }} />
              <col style={{ width: "12%" }} />
              <col style={{ width: "13%" }} />
              <col style={{ width: 76 }} />
              <col style={{ width: 76 }} />
              <col style={{ width: 44 }} />
              <col style={{ width: 32 }} />
            </colgroup>
            <thead>
              <tr style={{ background: "var(--color-background-secondary)" }}>
                <th style={thStyle}>Qty</th>
                <th style={thStyle}>Item</th>
                <th style={thStyle}>From</th>
                <th style={thStyle}>To</th>
                <th style={thStyle}>Reason</th>
                <th style={thStyle}>Moved</th>
                <th style={thStyle}>Arrived</th>
                <th style={thStyle}>By</th>
                <th style={thStyle}></th>
              </tr>
            </thead>
            <tbody>
              {transfers.map((t, idx) => {
                const item = data.items.find(i => i.id === t.itemId);
                const from = data.locations.find(l => l.id === t.fromLocationId);
                const to = data.locations.find(l => l.id === t.toLocationId);
                const transit = t.status === "in_transit";
                return (
                  <tr
                    key={t.id}
                    style={{ background: idx % 2 === 0 ? "transparent" : "var(--color-background-secondary)" }}
                  >
                    <td style={{ ...tdStyle, fontWeight: 500, textAlign: "center" }}>{t.qty ?? 1}</td>
                    <td style={tdStyle}>
                      <div style={{ fontWeight: 500, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }} title={item?.name}>{item?.name ?? "Unknown"}</div>
                      {item?.sku && <div style={{ fontSize: 11, fontFamily: "var(--font-mono)", color: "var(--color-text-tertiary)", marginTop: 1 }}>{item.sku}</div>}
                      {t.reason && <span style={{ fontSize: 11, marginTop: 2, display: "inline-block", background: "var(--color-background-secondary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: 4, padding: "1px 6px", color: "var(--color-text-secondary)" }}>{t.reason}</span>}
                      {t.note && <div style={{ fontSize: 11, color: "var(--color-text-tertiary)", marginTop: 1, fontStyle: "italic", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }} title={t.note}>"{t.note}"</div>}
                    </td>
                    <td style={{ ...tdStyle, color: "var(--color-text-secondary)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }} title={from?.name}>{from?.name ?? "?"}</td>
                    <td style={{ ...tdStyle, color: "var(--color-text-secondary)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }} title={to?.name}>{to?.name ?? "?"}</td>
                    <td style={{ ...tdStyle, fontSize: 12, color: "var(--color-text-secondary)", whiteSpace: "nowrap" }}>{t.reason || "—"}</td>
                    <td style={{ ...tdStyle, fontSize: 12, color: "var(--color-text-secondary)" }}><FmtCell ts={t.removedAt} /></td>
                    <td style={{ ...tdStyle, fontSize: 12, whiteSpace: "nowrap" }}>
                      {transit
                        ? <span style={{ color: "var(--color-text-warning)", display: "flex", alignItems: "center", gap: 4 }}><i className="ti ti-clock" style={{ fontSize: 12 }} aria-hidden="true"></i> In transit</span>
                        : <span style={{ color: "var(--color-text-success)" }}><FmtCell ts={t.arrivedAt} /></span>
                      }
                    </td>
                    <td style={{ ...tdStyle, fontSize: 12, textAlign: "center", whiteSpace: "nowrap" }}>
                      {t.checkedOutBy && <div style={{ fontFamily: "var(--font-mono)", fontWeight: 600, fontSize: 12 }} title="Checked out by">{t.checkedOutBy}</div>}
                      {t.checkedInBy && <div style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--color-text-tertiary)" }} title="Checked in by">→{t.checkedInBy}</div>}
                    </td>
                    <td style={{ ...tdStyle, textAlign: "center", padding: "9px 4px" }}>
                      <button
                        onClick={() => deleteTransfer(t.id)}
                        style={{ background: "transparent", border: "none", color: "var(--color-text-tertiary)", cursor: "pointer", padding: 4, fontSize: 14 }}
                        aria-label="Delete transfer record"
                      >
                        <i className="ti ti-trash" aria-hidden="true"></i>
                      </button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function Setup({ data, save }) {
  const [newLoc, setNewLoc] = useState("");
  const [newItem, setNewItem] = useState("");
  const [newSku, setNewSku] = useState("");
  const [newCat, setNewCat] = useState("");
  const [itemSearch, setItemSearch] = useState("");

  function addLocation() {
    if (!newLoc.trim()) return;
    save({ ...data, locations: [...data.locations, { id: genId(), name: newLoc.trim() }] });
    setNewLoc("");
  }

  function removeLocation(id) {
    save({ ...data, locations: data.locations.filter(l => l.id !== id) });
  }

  function addItem() {
    if (!newItem.trim()) return;
    save({ ...data, items: [...data.items, { id: genId(), sku: newSku.trim(), name: newItem.trim(), category: newCat.trim() }] });
    setNewItem(""); setNewSku(""); setNewCat("");
  }

  function removeItem(id) {
    save({ ...data, items: data.items.filter(i => i.id !== id) });
  }

  const filteredItems = itemSearch.trim()
    ? data.items.filter(i =>
        i.name.toLowerCase().includes(itemSearch.toLowerCase()) ||
        (i.sku && i.sku.toLowerCase().includes(itemSearch.toLowerCase())) ||
        (i.category && i.category.toLowerCase().includes(itemSearch.toLowerCase()))
      )
    : data.items;

  const categories = [...new Set(data.items.map(i => i.category).filter(Boolean))];

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
      {/* Locations */}
      <section>
        <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 10 }}>Locations</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 10 }}>
          {data.locations.map(l => (
            <div key={l.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: "var(--color-background-secondary)", borderRadius: "var(--border-radius-md)", padding: "8px 12px" }}>
              <span style={{ fontSize: 13 }}><i className="ti ti-map-pin" style={{ fontSize: 14, marginRight: 6 }} aria-hidden="true"></i>{l.name}</span>
              <button onClick={() => removeLocation(l.id)} style={{ background: "transparent", border: "none", color: "var(--color-text-tertiary)", cursor: "pointer", fontSize: 14 }} aria-label={`Remove ${l.name}`}>
                <i className="ti ti-x" aria-hidden="true"></i>
              </button>
            </div>
          ))}
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <input type="text" placeholder="New location name" value={newLoc} onChange={e => setNewLoc(e.target.value)} onKeyDown={e => e.key === "Enter" && addLocation()} style={{ flex: 1 }} />
          <button onClick={addLocation} disabled={!newLoc.trim()} style={{ padding: "8px 16px" }}>
            <i className="ti ti-plus" aria-hidden="true"></i> Add
          </button>
        </div>
      </section>

      {/* Items */}
      <section>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
          <div style={{ fontSize: 13, fontWeight: 500 }}>Items ({data.items.length})</div>
          <input type="text" placeholder="Search SKU or name…" value={itemSearch} onChange={e => setItemSearch(e.target.value)} style={{ fontSize: 12, padding: "4px 8px", width: 200 }} />
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 4, marginBottom: 10, maxHeight: 320, overflowY: "auto" }}>
          {filteredItems.map(i => (
            <div key={i.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: "var(--color-background-secondary)", borderRadius: "var(--border-radius-md)", padding: "7px 12px" }}>
              <div>
                <span style={{ fontSize: 13 }}>{i.name}</span>
                <span style={{ fontSize: 11, fontFamily: "var(--font-mono)", color: "var(--color-text-tertiary)", marginLeft: 8 }}>{i.sku}</span>
                {i.category && <span style={{ fontSize: 11, color: "var(--color-text-tertiary)", marginLeft: 6, background: "var(--color-background-primary)", padding: "1px 6px", borderRadius: 4, border: "0.5px solid var(--color-border-tertiary)" }}>{i.category}</span>}
              </div>
              <button onClick={() => removeItem(i.id)} style={{ background: "transparent", border: "none", color: "var(--color-text-tertiary)", cursor: "pointer", fontSize: 14, flexShrink: 0 }} aria-label={`Remove ${i.name}`}>
                <i className="ti ti-x" aria-hidden="true"></i>
              </button>
            </div>
          ))}
          {filteredItems.length === 0 && <div style={{ fontSize: 13, color: "var(--color-text-tertiary)", padding: "8px 0" }}>No items match that search.</div>}
        </div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <input type="text" placeholder="SKU" value={newSku} onChange={e => setNewSku(e.target.value)} onKeyDown={e => e.key === "Enter" && addItem()} style={{ flex: "1 1 100px", minWidth: 80 }} />
          <input type="text" placeholder="Item name" value={newItem} onChange={e => setNewItem(e.target.value)} onKeyDown={e => e.key === "Enter" && addItem()} style={{ flex: "2 1 160px" }} />
          <input type="text" placeholder="Category" value={newCat} onChange={e => setNewCat(e.target.value)} onKeyDown={e => e.key === "Enter" && addItem()} style={{ flex: "1 1 100px" }} />
          <button onClick={addItem} disabled={!newItem.trim()} style={{ padding: "8px 16px" }}>
            <i className="ti ti-plus" aria-hidden="true"></i> Add
          </button>
        </div>
      </section>
    </div>
  );
}

function DailyCount({ data, save }) {
  const today = new Date().toISOString().slice(0, 10);

  // Tempest Device IDs and key location IDs
  const TEMPEST_IDS   = ["i01", "i02"];
  const TESTING_LOC   = "loc2";   // Testing Room
  const SHIPPING_LOC  = "loc7";   // Shipping
  const EXCLUDE_LOCS  = ["loc7", "loc10"]; // Shipping + R&D — excluded from Remaining

  const emptyForm = {
    date: today,
    qtyReceived: "",
    qtyTested: "",
    prodWeek: "",
    regular: "",
    aMinus: "",
    qtyFailedQCHold: "",
    qcHoldFixed: "",
    manualAdjNewRTS: "",
    returnsRTS: "",
    manualAdjBalance: "",
    qtyShippedShopify: "",
    qtyShippedB2B: "",
    qtyShippedFeeder: "",
    qtyShippedAmazon: "",
    openingRTSBalance: "",
  };

  const [form, setForm]           = useState(emptyForm);
  const [editingId, setEditingId] = useState(null);
  const [showModal, setShowModal] = useState(false);
  const [autoFills, setAutoFills] = useState({});

  const rows = data.countRows || [];
  const n    = v => parseFloat(v) || 0;
  const isFirstRow = rows.length === 0 || (editingId && rows[0].id === editingId);

  // ── Live Remaining: sum of Tempest inventory at all non-excluded locations ──
  function calcLiveRemaining() {
    return (data.inventory || [])
      .filter(e => TEMPEST_IDS.includes(e.itemId) && !EXCLUDE_LOCS.includes(e.locationId))
      .reduce((sum, e) => sum + e.qty, 0);
  }

  // ── Build calculated values for the count sheet table ──
  const calc = [];
  for (let i = 0; i < rows.length; i++) {
    const r    = rows[i];
    const prev = i > 0 ? calc[i - 1] : null;
    const newRTS            = n(r.qtyTested) - n(r.qtyFailedQCHold) + n(r.qcHoldFixed) - n(r.manualAdjNewRTS);
    const rtsBalancePrevDay = prev ? prev.currentRTSBalance : n(r.openingRTSBalance);
    const currentRTSBalance = rtsBalancePrevDay + newRTS + n(r.returnsRTS) + n(r.manualAdjBalance)
      - n(r.qtyShippedShopify) - n(r.qtyShippedB2B) - n(r.qtyShippedFeeder) - n(r.qtyShippedAmazon);
    calc.push({ ...r, newRTS, rtsBalancePrevDay, currentRTSBalance });
  }

  // ── Auto-fill helpers ──
  function tsMatchesDate(ts, dateStr) {
    // Check if a timestamp falls on a given YYYY-MM-DD date (local time)
    if (!ts) return false;
    const d = new Date(ts);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}` === dateStr;
  }

  function autoFillForDate(dateStr) {
    // Qty Received: new PO inventory entries on this date
    const received = (data.inventory || [])
      .filter(e => TEMPEST_IDS.includes(e.itemId) && e.receivedFrom === "From PO" && tsMatchesDate(e.addedAt, dateStr))
      .reduce((sum, e) => sum + e.qty, 0);

    // Qty Tested: Tempest Devices FROM Testing Room TO Shipping confirmed on this date
    const tested = (data.transfers || [])
      .filter(t =>
        t.status === "completed" &&
        TEMPEST_IDS.includes(t.itemId) &&
        t.fromLocationId === TESTING_LOC &&
        t.toLocationId === SHIPPING_LOC &&
        tsMatchesDate(t.arrivedAt || t.removedAt, dateStr)
      )
      .reduce((sum, t) => sum + (t.qty || 1), 0);

    return { received, tested };
  }

  // Re-run auto-fill when date changes in a new entry (not when editing)
  useEffect(() => {
    if (!showModal || editingId) return;
    const { received, tested } = autoFillForDate(form.date);
    const fills = {};
    setForm(f => ({
      ...f,
      qtyReceived: received > 0 ? String(received) : "",
      qtyTested:   tested   > 0 ? String(tested)   : "",
    }));
    if (received > 0) fills.received = received;
    if (tested   > 0) fills.tested   = tested;
    setAutoFills(fills);
  }, [form.date, showModal]);

  function openModal(rowToEdit = null) {
    if (rowToEdit) {
      setForm({ ...rowToEdit });
      setEditingId(rowToEdit.id);
      setAutoFills({});
    } else {
      setForm({ ...emptyForm, date: today });
      setEditingId(null);
      // auto-fill triggered by useEffect above when showModal becomes true
    }
    setShowModal(true);
  }

  function closeModal() {
    setShowModal(false);
    setEditingId(null);
    setAutoFills({});
    setForm(emptyForm);
  }

  function setField(field, value) {
    setForm(f => ({ ...f, [field]: value }));
  }

  function submitRow() {
    const rowData = { ...form, id: editingId || genId(), qtyRemaining: calcLiveRemaining() };
    if (editingId) {
      save({ ...data, countRows: rows.map(r => r.id === editingId ? rowData : r) });
    } else {
      save({ ...data, countRows: [...rows, rowData] });
    }
    closeModal();
  }

  function deleteRow(id) {
    if (!window.confirm("Delete this entry from the count sheet? This cannot be undone.")) return;
    save({ ...data, countRows: rows.filter(r => r.id !== id) });
  }

  function editRow(row) { openModal(row); }

  const calcVal = v => (
    <span style={{ color: v < 0 ? "#c0392b" : "inherit" }}>{v.toLocaleString()}</span>
  );

  const numField = (label, field, note = null) => (
    <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
      <Field label={label}>
        <input
          type="number"
          value={form[field]}
          onChange={e => setField(field, e.target.value)}
          placeholder="0"
          style={{ width: "100%", textAlign: "center" }}
        />
      </Field>
      {note && <div style={{ fontSize: 11, color: "#3a5a99" }}>{note}</div>}
    </div>
  );

  // Table styles
  const thBase   = { padding: "6px 8px", fontSize: 10, fontWeight: 600, color: "var(--color-text-secondary)", textAlign: "center", borderBottom: "0.5px solid var(--color-border-tertiary)", textTransform: "uppercase", letterSpacing: "0.04em", whiteSpace: "nowrap", background: "var(--color-background-secondary)" };
  const thCalc   = { ...thBase, background: "#e8edf8", color: "#3a5a99" };
  const thSec    = { ...thBase, fontSize: 9, background: "#d0d8ee", color: "#2a4a88", borderBottom: "none", paddingBottom: 2 };
  const thStrong = { ...thBase, fontSize: 10, fontWeight: 700, color: "#fff", background: "#2a4a88" };
  const tdBase   = { padding: "7px 10px", fontSize: 12, borderBottom: "0.5px solid var(--color-border-tertiary)", verticalAlign: "middle", textAlign: "center", whiteSpace: "nowrap" };
  const tdCalc   = { ...tdBase, background: "#f0f4ff", fontWeight: 500 };
  const tdStrong = { ...tdCalc, background: "#dce6ff", fontWeight: 700, fontSize: 13 };

  const liveRemaining = calcLiveRemaining();

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>

      {/* ── Header ── */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div>
          <div style={{ fontWeight: 500, fontSize: 14 }}>Daily Tempest Count</div>
          <div style={{ fontSize: 12, color: "var(--color-text-tertiary)", marginTop: 2 }}>
            Tempests awaiting testing (current): <strong style={{ color: liveRemaining > 0 ? "#2a4a88" : "var(--color-text-tertiary)" }}>{liveRemaining.toLocaleString()}</strong>
          </div>
        </div>
        <button
          onClick={() => openModal()}
          style={{ padding: "8px 18px", background: "#2a4a88", color: "#fff", border: "none", borderRadius: 6, fontWeight: 600, fontSize: 13, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}
        >
          <i className="ti ti-plus" aria-hidden="true"></i> Add Entry
        </button>
      </div>

      {/* ── Modal ── */}
      {showModal && (
        <div
          style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}
          onClick={e => { if (e.target === e.currentTarget) closeModal(); }}
        >
          <div style={{ background: "#fff", borderRadius: 10, width: "100%", maxWidth: 560, maxHeight: "90vh", overflowY: "auto", boxShadow: "0 8px 40px rgba(0,0,0,0.18)" }}>

            {/* Modal header */}
            <div style={{ background: "#e8edf8", borderBottom: "0.5px solid #b0c0e8", padding: "14px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", borderRadius: "10px 10px 0 0", position: "sticky", top: 0, zIndex: 1 }}>
              <div style={{ fontWeight: 700, fontSize: 14, color: "#2a4a88" }}>
                <i className="ti ti-clipboard-list" style={{ marginRight: 8 }} aria-hidden="true"></i>
                {editingId ? "Edit Entry" : "New Entry"}
              </div>
              <button onClick={closeModal} style={{ background: "transparent", border: "none", fontSize: 20, color: "#555", cursor: "pointer", lineHeight: 1, padding: 2 }} aria-label="Close">×</button>
            </div>

            <div style={{ padding: "20px", display: "flex", flexDirection: "column", gap: 20 }}>

              {/* Auto-fill notices */}
              {(autoFills.received || autoFills.tested) && (
                <div style={{ background: "#f0f4ff", border: "0.5px solid #b0c0e8", borderRadius: 6, padding: "10px 14px", display: "flex", flexDirection: "column", gap: 4 }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: "#3a5a99", display: "flex", alignItems: "center", gap: 5 }}>
                    <i className="ti ti-bolt" style={{ fontSize: 13 }} aria-hidden="true"></i> Auto-filled from transfer history
                  </div>
                  {autoFills.received && <div style={{ fontSize: 12, color: "#3a5a99" }}>· Qty Received: {autoFills.received} units from new PO arrivals</div>}
                  {autoFills.tested   && <div style={{ fontSize: 12, color: "#3a5a99" }}>· Qty Tested: {autoFills.tested} units moved Testing Room → Shipping</div>}
                  <div style={{ fontSize: 11, color: "#6a8acc", marginTop: 2 }}>Review and adjust if needed.</div>
                </div>
              )}

              {/* Remaining reference */}
              <div style={{ background: "var(--color-background-secondary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: 6, padding: "9px 14px", fontSize: 12, color: "var(--color-text-secondary)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span>Current Tempests awaiting testing (all locations)</span>
                <strong style={{ fontSize: 15, color: "#2a4a88" }}>{liveRemaining.toLocaleString()}</strong>
              </div>

              {/* Section 1 — Testing Queue */}
              <div>
                <div style={{ fontSize: 10, fontWeight: 700, color: "#2a4a88", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 12, paddingBottom: 4, borderBottom: "0.5px solid #b0c0e8" }}>Testing Queue</div>
                <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
                  <Field label="Date">
                    <input type="date" value={form.date} onChange={e => setField("date", e.target.value)} style={{ width: 150 }} />
                  </Field>
                  {numField("Qty Received", "qtyReceived", autoFills.received ? "⚡ Auto-filled" : null)}
                  {numField("Qty Tested", "qtyTested", autoFills.tested ? "⚡ Auto-filled" : null)}
                  <Field label="Prod Week">
                    <input type="text" value={form.prodWeek} onChange={e => setField("prodWeek", e.target.value)} placeholder="e.g. MAR 50" style={{ width: 110 }} />
                  </Field>
                  {numField("Regular", "regular")}
                  {numField("A−", "aMinus")}
                </div>
              </div>

              {/* Section 2 — RTS Production */}
              <div>
                <div style={{ fontSize: 10, fontWeight: 700, color: "#2a4a88", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 12, paddingBottom: 4, borderBottom: "0.5px solid #b0c0e8" }}>RTS Production</div>
                <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
                  {numField("Failed / QC Hold", "qtyFailedQCHold")}
                  {numField("QC Hold Fixed", "qcHoldFixed")}
                  {numField("Manual Adj", "manualAdjNewRTS")}
                </div>
              </div>

              {/* Section 3 — RTS Shipments */}
              <div>
                <div style={{ fontSize: 10, fontWeight: 700, color: "#2a4a88", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 12, paddingBottom: 4, borderBottom: "0.5px solid #b0c0e8" }}>RTS Shipments</div>
                <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
                  {numField("Returns", "returnsRTS")}
                  {numField("Balance Adj", "manualAdjBalance")}
                  {numField("Shopify", "qtyShippedShopify")}
                  {numField("B2B Store", "qtyShippedB2B")}
                  {numField("Feeder Store", "qtyShippedFeeder")}
                  {numField("Amazon", "qtyShippedAmazon")}
                  {isFirstRow && numField("Opening RTS Balance", "openingRTSBalance")}
                </div>
              </div>

              {/* Footer */}
              <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", paddingTop: 4, borderTop: "0.5px solid var(--color-border-tertiary)" }}>
                <button onClick={closeModal} style={{ padding: "8px 18px", fontSize: 13 }}>Cancel</button>
                <button
                  onClick={submitRow}
                  style={{ padding: "8px 24px", background: "#2a4a88", color: "#fff", border: "none", borderRadius: 6, fontWeight: 600, fontSize: 13, cursor: "pointer" }}
                >
                  <i className={`ti ${editingId ? "ti-device-floppy" : "ti-plus"}`} aria-hidden="true"></i>{" "}
                  {editingId ? "Save Changes" : "Add to Count Sheet"}
                </button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ── Count Sheet Table ── */}
      {calc.length === 0 ? (
        <Notice icon="ti-clipboard-list" text="No entries yet. Hit 'Add Entry' to start today's count." />
      ) : (
        <div>
          <div style={{ fontWeight: 500, fontSize: 13, marginBottom: 8, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <span>Count Sheet — {calc.length} {calc.length === 1 ? "entry" : "entries"}</span>
            <div style={{ fontSize: 12, color: "var(--color-text-tertiary)" }}>
              <span style={{ display: "inline-block", width: 10, height: 10, background: "#f0f4ff", border: "0.5px solid #b0c0e8", borderRadius: 2, marginRight: 4, verticalAlign: "middle" }}></span>Calculated
            </div>
          </div>
          <div style={{ overflowX: "auto" }}>
            <table style={{ borderCollapse: "collapse", fontSize: 12, minWidth: 860 }}>
              <thead>
                <tr>
                  <th style={thBase} rowSpan={2}>#</th>
                  <th style={thBase} rowSpan={2}></th>
                  <th style={thBase} rowSpan={2}>Date</th>
                  <th colSpan={6} style={{ ...thSec, borderRight: "1px solid #b0c0e8" }}>Testing Queue</th>
                  <th colSpan={4} style={{ ...thSec, borderRight: "1px solid #b0c0e8" }}>RTS Production</th>
                  <th colSpan={6} style={{ ...thSec, borderRight: "1px solid #b0c0e8" }}>RTS Shipments</th>
                  <th style={thStrong} rowSpan={2}>RTS<br/>Balance</th>
                </tr>
                <tr>
                  <th style={thBase}>Rcvd</th>
                  <th style={thBase}>Tested</th>
                  <th style={thBase}>Prod Wk</th>
                  <th style={thBase}>Reg</th>
                  <th style={thBase}>A−</th>
                  <th style={{ ...thCalc, borderRight: "1px solid #b0c0e8" }}>Remaining</th>
                  <th style={thBase}>Failed</th>
                  <th style={thBase}>Fixed</th>
                  <th style={thBase}>Adj</th>
                  <th style={{ ...thCalc, borderRight: "1px solid #b0c0e8" }}>New RTS</th>
                  <th style={thBase}>Returns</th>
                  <th style={thBase}>Bal Adj</th>
                  <th style={thBase}>Shopify</th>
                  <th style={thBase}>B2B</th>
                  <th style={thBase}>Feeder</th>
                  <th style={{ ...thBase, borderRight: "1px solid #b0c0e8" }}>Amazon</th>
                </tr>
              </thead>
              <tbody>
                {calc.map((row, idx) => (
                  <tr key={row.id} style={{ background: editingId === row.id ? "#fffbe8" : idx % 2 === 0 ? "transparent" : "var(--color-background-secondary)" }}>
                    <td style={{ ...tdBase, color: "var(--color-text-tertiary)", fontSize: 11 }}>{idx + 1}</td>
                    <td style={{ ...tdBase, padding: "7px 6px", whiteSpace: "nowrap" }}>
                      <button onClick={() => editRow(row)} style={{ background: "#e8edf8", border: "0.5px solid #b0c0e8", color: "#2a4a88", cursor: "pointer", padding: "3px 8px", borderRadius: 4, fontSize: 11, fontWeight: 600, marginRight: 3 }}>Edit</button>
                      <button onClick={() => deleteRow(row.id)} style={{ background: "#fde8e8", border: "0.5px solid #f0b0b0", color: "#c0392b", cursor: "pointer", padding: "3px 8px", borderRadius: 4, fontSize: 11, fontWeight: 600 }}>Del</button>
                    </td>
                    <td style={{ ...tdBase, fontWeight: 500 }}>{row.date}</td>
                    <td style={tdBase}>{n(row.qtyReceived) || "—"}</td>
                    <td style={tdBase}>{n(row.qtyTested) || "—"}</td>
                    <td style={tdBase}>{row.prodWeek || "—"}</td>
                    <td style={tdBase}>{row.regular || "—"}</td>
                    <td style={tdBase}>{row.aMinus || "—"}</td>
                    <td style={{ ...tdStrong, borderRight: "1px solid #b0c0e8" }}>{calcVal(n(row.qtyRemaining))}</td>
                    <td style={tdBase}>{n(row.qtyFailedQCHold) || "—"}</td>
                    <td style={tdBase}>{n(row.qcHoldFixed) || "—"}</td>
                    <td style={tdBase}>{n(row.manualAdjNewRTS) || "—"}</td>
                    <td style={{ ...tdCalc, borderRight: "1px solid #b0c0e8" }}>{calcVal(row.newRTS)}</td>
                    <td style={tdBase}>{n(row.returnsRTS) || "—"}</td>
                    <td style={tdBase}>{n(row.manualAdjBalance) || "—"}</td>
                    <td style={tdBase}>{n(row.qtyShippedShopify) || "—"}</td>
                    <td style={tdBase}>{n(row.qtyShippedB2B) || "—"}</td>
                    <td style={tdBase}>{n(row.qtyShippedFeeder) || "—"}</td>
                    <td style={{ ...tdBase, borderRight: "1px solid #b0c0e8" }}>{n(row.qtyShippedAmazon) || "—"}</td>
                    <td style={tdStrong}>{calcVal(row.currentRTSBalance)}</td>
                  </tr>
                ))}
              </tbody>
              <tfoot>
                <tr style={{ borderTop: "1px solid #b0c0e8", background: "#e8edf8" }}>
                  <td></td>
                  <td colSpan={6} style={{ ...tdBase, textAlign: "right", fontSize: 11, color: "#3a5a99", fontStyle: "italic", fontWeight: 600 }}>Current totals →</td>
                  <td style={{ ...tdStrong, borderRight: "1px solid #b0c0e8" }}>{liveRemaining.toLocaleString()}</td>
                  <td colSpan={4} style={{ borderRight: "1px solid #b0c0e8" }}></td>
                  <td colSpan={5} style={{ borderRight: "1px solid #b0c0e8" }}></td>
                  <td style={tdStrong}>{calcVal(calc[calc.length - 1].currentRTSBalance)}</td>
                  <td></td>
                </tr>
              </tfoot>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}


function Inventory({ data, save }) {
  const [locId, setLocId] = useState("");
  const [itemId, setItemId] = useState("");
  const [qty, setQty] = useState(1);
  const [receivedFrom, setReceivedFrom] = useState("");
  const [note, setNote] = useState("");
  const [added, setAdded] = useState(false);

  const locEntries = data.inventory.filter(e => e.locationId === locId);

  function addEntry() {
    if (!locId || !itemId) return;
    const existing = data.inventory.find(e => e.locationId === locId && e.itemId === itemId);
    let updated;
    if (existing) {
      updated = data.inventory.map(e =>
        e.id === existing.id ? { ...e, qty: e.qty + Number(qty), note: note.trim() || e.note } : e
      );
    } else {
      updated = [...data.inventory, {
        id: genId(),
        locationId: locId,
        itemId,
        qty: Number(qty),
        receivedFrom: receivedFrom,
        note: note.trim(),
        addedAt: Date.now(),
      }];
    }
    save({ ...data, inventory: updated });
    setItemId(""); setQty(1); setReceivedFrom(""); setNote("");
    setAdded(true);
    setTimeout(() => setAdded(false), 2000);
  }

  function updateQty(entryId, newQty) {
    const val = Math.max(0, parseInt(newQty) || 0);
    if (val === 0) {
      save({ ...data, inventory: data.inventory.filter(e => e.id !== entryId) });
    } else {
      save({ ...data, inventory: data.inventory.map(e => e.id === entryId ? { ...e, qty: val } : e) });
    }
  }

  function removeEntry(entryId) {
    save({ ...data, inventory: data.inventory.filter(e => e.id !== entryId) });
  }

  const thStyle = {
    padding: "8px 10px",
    fontSize: 11,
    fontWeight: 500,
    color: "var(--color-text-secondary)",
    textAlign: "left",
    borderBottom: "0.5px solid var(--color-border-tertiary)",
    textTransform: "uppercase",
    letterSpacing: "0.04em",
    whiteSpace: "nowrap",
  };
  const tdStyle = {
    padding: "8px 10px",
    fontSize: 13,
    borderBottom: "0.5px solid var(--color-border-tertiary)",
    verticalAlign: "middle",
  };

  const totalItems = locEntries.reduce((sum, e) => sum + e.qty, 0);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>

      {/* Location selector */}
      <Field label="Location">
        <select value={locId} onChange={e => setLocId(e.target.value)} style={{ width: "100%" }}>
          <option value="">— Select a location —</option>
          {data.locations.map(l => (
            <option key={l.id} value={l.id}>{l.name}</option>
          ))}
        </select>
      </Field>

      {locId && (
        <>
          {/* Current inventory table */}
          <div>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span style={{ fontSize: 13, fontWeight: 500 }}>
                {data.locations.find(l => l.id === locId)?.name} — current inventory
              </span>
              {locEntries.length > 0 && (
                <span style={{ fontSize: 12, color: "var(--color-text-tertiary)" }}>
                  {locEntries.length} line{locEntries.length !== 1 ? "s" : ""} · {totalItems} units total
                </span>
              )}
            </div>

            {locEntries.length === 0 ? (
              <div style={{ fontSize: 13, color: "var(--color-text-tertiary)", padding: "12px 0", borderTop: "0.5px solid var(--color-border-tertiary)" }}>
                No starting inventory set for this location yet. Add items below.
              </div>
            ) : (
              <div style={{ overflowX: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", tableLayout: "fixed" }}>
                  <colgroup>
                    <col style={{ width: "34%" }} />
                    <col style={{ width: "16%" }} />
                    <col style={{ width: 80 }} />
                    <col style={{ width: "13%" }} />
                    <col style={{ width: "17%" }} />
                    <col style={{ width: 36 }} />
                  </colgroup>
                  <thead>
                    <tr style={{ background: "var(--color-background-secondary)" }}>
                      <th style={thStyle}>Item</th>
                      <th style={thStyle}>SKU</th>
                      <th style={{ ...thStyle, textAlign: "center" }}>Qty</th>
                      <th style={thStyle}>Received From</th>
                      <th style={thStyle}>Note</th>
                      <th style={thStyle}></th>
                    </tr>
                  </thead>
                  <tbody>
                    {locEntries.map((e, idx) => {
                      const item = data.items.find(i => i.id === e.itemId);
                      return (
                        <tr key={e.id} style={{ background: idx % 2 === 0 ? "transparent" : "var(--color-background-secondary)" }}>
                          <td style={tdStyle}>
                            <div style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }} title={item?.name}>{item?.name ?? "Unknown"}</div>
                            {item?.category && <div style={{ fontSize: 11, color: "var(--color-text-tertiary)", marginTop: 1 }}>{item.category}</div>}
                          </td>
                          <td style={{ ...tdStyle, fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--color-text-tertiary)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }} title={item?.sku}>{item?.sku ?? "—"}</td>
                          <td style={{ ...tdStyle, textAlign: "center" }}>
                            <input
                              type="number"
                              min="0"
                              value={e.qty}
                              onChange={ev => updateQty(e.id, ev.target.value)}
                              style={{ width: 60, textAlign: "center", fontSize: 13 }}
                              aria-label={`Quantity for ${item?.name}`}
                            />
                          </td>
                          <td style={{ ...tdStyle, fontSize: 12, color: "var(--color-text-secondary)", whiteSpace: "nowrap" }}>{e.receivedFrom || "—"}</td>
                          <td style={{ ...tdStyle, fontSize: 12, color: "var(--color-text-tertiary)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }} title={e.note}>{e.note || "—"}</td>
                          <td style={{ ...tdStyle, textAlign: "center", padding: "8px 4px" }}>
                            <button
                              onClick={() => removeEntry(e.id)}
                              style={{ background: "transparent", border: "none", color: "var(--color-text-tertiary)", cursor: "pointer", padding: 4, fontSize: 14 }}
                              aria-label={`Remove ${item?.name}`}
                            >
                              <i className="ti ti-trash" aria-hidden="true"></i>
                            </button>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </div>

          {/* Add item form */}
          <div style={{ borderTop: "0.5px solid var(--color-border-tertiary)", paddingTop: 16, display: "flex", flexDirection: "column", gap: 12 }}>
            <div style={{ fontSize: 13, fontWeight: 500 }}>Add item to this location</div>

            {added && (
              <div style={{ background: "var(--color-background-success)", border: "0.5px solid var(--color-border-success)", borderRadius: "var(--border-radius-md)", padding: "8px 12px", fontSize: 13, color: "var(--color-text-success)", display: "flex", alignItems: "center", gap: 8 }}>
                <i className="ti ti-check" aria-hidden="true"></i> Added to inventory.
              </div>
            )}

            <Field label="Item">
              <ItemSelect items={data.items} value={itemId} onChange={setItemId} />
            </Field>

            <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
              <Field label="Received From">
                <select value={receivedFrom} onChange={e => setReceivedFrom(e.target.value)} style={{ minWidth: 140 }}>
                  <option value="">— Select —</option>
                  <option value="From PO">From PO</option>
                  <option value="R&D">R&amp;D</option>
                  <option value="Other">Other</option>
                </select>
              </Field>
              <Field label="Quantity">
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <button onClick={() => setQty(q => Math.max(1, Number(q) - 1))} style={{ padding: "6px 12px", fontSize: 16, lineHeight: 1 }} aria-label="Decrease">−</button>
                  <input type="number" min="1" value={qty} onChange={e => setQty(Math.max(1, parseInt(e.target.value) || 1))} style={{ width: 70, textAlign: "center" }} />
                  <button onClick={() => setQty(q => Number(q) + 1)} style={{ padding: "6px 12px", fontSize: 16, lineHeight: 1 }} aria-label="Increase">+</button>
                </div>
              </Field>
            </div>
            <Field label="Note (optional)">
              <input type="text" placeholder="PO number, condition, batch, etc." value={note} onChange={e => setNote(e.target.value)} style={{ width: "100%" }} />
            </Field>

            <button
              onClick={addEntry}
              disabled={!itemId}
              style={{ alignSelf: "flex-start", padding: "8px 20px", opacity: !itemId ? 0.4 : 1, cursor: !itemId ? "not-allowed" : "pointer" }}
            >
              <i className="ti ti-plus" aria-hidden="true"></i> Add to inventory
            </button>
          </div>
        </>
      )}
    </div>
  );
}


function ItemSelect({ items, value, onChange, emptyMessage }) {
  const [search, setSearch] = useState("");
  const [open, setOpen] = useState(false);
  const containerRef = useRef(null);

  const selectedItem = items.find(i => i.id === value);

  useEffect(() => {
    function handleClick(e) {
      if (containerRef.current && !containerRef.current.contains(e.target)) {
        setOpen(false);
        setSearch("");
      }
    }
    document.addEventListener("mousedown", handleClick);
    return () => document.removeEventListener("mousedown", handleClick);
  }, []);

  const filtered = search.trim()
    ? items.filter(i =>
        i.name.toLowerCase().includes(search.toLowerCase()) ||
        (i.sku && i.sku.toLowerCase().includes(search.toLowerCase()))
      )
    : items;

  const categories = [...new Set(filtered.map(i => i.category).filter(Boolean))];

  function select(id) {
    onChange(id);
    setSearch("");
    setOpen(false);
  }

  function handleInputChange(e) {
    setSearch(e.target.value);
    setOpen(true);
    if (!e.target.value) onChange("");
  }

  const displayValue = open
    ? search
    : selectedItem
      ? (selectedItem.sku ? `[${selectedItem.sku}]  ${selectedItem.name}` : selectedItem.name)
      : "";

  return (
    <div ref={containerRef} style={{ position: "relative" }}>
      <input
        type="text"
        placeholder="Search by name or SKU…"
        value={displayValue}
        onChange={handleInputChange}
        onFocus={() => { setOpen(true); setSearch(""); }}
        style={{ width: "100%", fontSize: 13 }}
        aria-label="Search and select item"
        aria-expanded={open}
        autoComplete="off"
      />
      {open && (
        <div style={{
          position: "absolute", top: "calc(100% + 4px)", left: 0, right: 0,
          zIndex: 200, background: "#fff",
          border: "0.5px solid var(--color-border-tertiary)",
          borderRadius: "var(--border-radius-md)",
          maxHeight: 280, overflowY: "auto",
          boxShadow: "0 4px 16px rgba(0,0,0,0.10)",
        }}>
          {filtered.length === 0 ? (
            <div style={{ padding: "12px 14px", fontSize: 13, color: "var(--color-text-tertiary)" }}>{emptyMessage || "No items match."}</div>
          ) : (
            categories.map(cat => (
              <div key={cat}>
                <div style={{
                  padding: "6px 12px", fontSize: 10, fontWeight: 600,
                  color: "var(--color-text-tertiary)", textTransform: "uppercase",
                  letterSpacing: "0.06em", background: "var(--color-background-secondary)",
                  borderBottom: "0.5px solid var(--color-border-tertiary)",
                  position: "sticky", top: 0,
                }}>{cat}</div>
                {filtered.filter(i => i.category === cat).map(i => (
                  <div
                    key={i.id}
                    onMouseDown={() => select(i.id)}
                    style={{
                      padding: "9px 14px", fontSize: 13, cursor: "pointer",
                      borderBottom: "0.5px solid var(--color-border-tertiary)",
                      background: value === i.id ? "var(--color-background-secondary)" : "transparent",
                    }}
                    onMouseEnter={e => e.currentTarget.style.background = "var(--color-background-secondary)"}
                    onMouseLeave={e => e.currentTarget.style.background = value === i.id ? "var(--color-background-secondary)" : "transparent"}
                  >
                    <div style={{ fontWeight: value === i.id ? 500 : 400 }}>{i.name}</div>
                    {i.sku && <div style={{ fontSize: 11, color: "var(--color-text-tertiary)", fontFamily: "var(--font-mono)", marginTop: 2 }}>{i.sku}</div>}
                  </div>
                ))}
              </div>
            ))
          )}
        </div>
      )}
    </div>
  );
}

function Field({ label, children }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
      <label style={{ fontSize: 12, color: "var(--color-text-secondary)", fontWeight: 500 }}>{label}</label>
      {children}
    </div>
  );
}

function Notice({ icon, text }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "16px 0", color: "var(--color-text-secondary)", fontSize: 13 }}>
      <i className={`ti ${icon}`} style={{ fontSize: 18 }} aria-hidden="true"></i>
      <span>{text}</span>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
